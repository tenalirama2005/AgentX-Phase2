# ============================================================
# AgentX Phase 2 — FBA Consensus Model Registry
# 31-Node Federated Byzantine Agreement Network
# Based on: arxiv:2507.11768
#
# Quorum: 2/3 of responding nodes must agree (≥21/31)
# Provider A: Anthropic (Claude)
# Provider B: Nebius Token Factory (all others)
# API: https://api.tokenfactory.nebius.com/v1/chat/completions
# ============================================================

[network]
quorum_threshold    = 0.667   # 2/3 of responding nodes must agree
similarity_threshold = 0.75   # semantic similarity for code agreement
confidence_threshold = 0.80   # minimum per-node confidence
pass1_max_tokens    = 1024    # reasoning pass — all nodes
description         = "31-node FBA consensus for COBOL→Rust modernization"

# ============================================================
# ANCHOR NODES — Highest capability, proprietary APIs
# ============================================================

[[models]]
node_id     = "claude_opus_4_6"
model_name  = "Claude Opus 4.6"
provider    = "anthropic"
model_id    = "claude-opus-4-6"
pass2_max_tokens = 1500
temperature = 0.1
family      = "claude"
tier        = "anchor"
cost_input  = 15.00   # $/1M tokens
cost_output = 75.00


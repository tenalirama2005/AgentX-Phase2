name: Socket.dev Supply Chain Security + Rust Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'purple_agent/**'
      - 'green_agent/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Socket.dev Supply Chain Scan ─────────────────────────────────────
  socket-scan:
    name: Socket.dev Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Socket Security Scan
        uses: nicolo-ribaudo/socket-security-action@v1
        with:
          api-token: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          # Fail the build if high-severity issues found
          fail-on-severity: high

  # ── Job 2: Rust Build + Test ─────────────────────────────────────────────────
  rust-build:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    needs: socket-scan  # Only build if supply chain is clean
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check
        working-directory: purple_agent

      - name: Clippy lint
        run: cargo clippy -- -D warnings
        working-directory: purple_agent

      - name: Build
        run: cargo build --release
        working-directory: purple_agent

      - name: Run tests
        run: cargo test
        working-directory: purple_agent

  # ── Job 3: Docker Build ───────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: rust-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t purple_agent:${{ github.sha }} .
        working-directory: purple_agent
---
# Agent Gateway JWT Secret
# Generate real value: openssl rand -base64 48
apiVersion: v1
kind: Secret
metadata:
  name: gateway-jwt-secret
  namespace: mainframe-modernization
  labels:
    app: agent-gateway
type: Opaque
stringData:
  jwt-secret: "CHANGE_ME_USE_KUBECTL_OR_SEALED_SECRETS"
---
# Green Agent credentials
apiVersion: v1
kind: Secret
metadata:
  name: green-agent-credentials
  namespace: mainframe-modernization
  labels:
    app: green-agent
type: Opaque
stringData:
  api-key: "CHANGE_ME_GREEN_AGENT_KEY"
  aws-access-key-id: "CHANGE_ME"
  aws-secret-access-key: "CHANGE_ME"
  aws-region: "us-east-1"
---
# Purple Agent credentials
apiVersion: v1
kind: Secret
metadata:
  name: purple-agent-credentials
  namespace: mainframe-modernization
  labels:
    app: purple-agent
type: Opaque
stringData:
  api-key: "CHANGE_ME_PURPLE_AGENT_KEY"
  anthropic-api-key: "CHANGE_ME_ANTHROPIC_KEY"
---
# S3 MCP credentials
apiVersion: v1
kind: Secret
metadata:
  name: s3-mcp-credentials
  namespace: mainframe-modernization
  labels:
    app: s3-mcp
type: Opaque
stringData:
  aws-access-key-id: "CHANGE_ME"
  aws-secret-access-key: "CHANGE_ME"
  aws-region: "us-east-1"
---
# AI MCP credentials (Claude claude-opus-4-6)
apiVersion: v1
kind: Secret
metadata:
  name: ai-mcp-credentials
  namespace: mainframe-modernization
  labels:
    app: ai-mcp
type: Opaque
stringData:
  claude-api-key: "CHANGE_ME_ANTHROPIC_KEY"
---
# Pipeline ConfigMap (non-sensitive)
apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-config
  namespace: mainframe-modernization
data:
  s3-bucket: "mainframe-refactor-lab-venkatnagala"
  aws-region: "us-east-1"
  claude-model: "claude-opus-4-6"
  gateway-url: "http://agent-gateway:8090"
  log-level: "info"

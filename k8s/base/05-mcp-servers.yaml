---
# S3 MCP - AWS S3 Operations
apiVersion: apps/v1
kind: Deployment
metadata:
  name: s3-mcp
  namespace: mainframe-modernization
  labels:
    app: s3-mcp
    component: mcp-server
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s3-mcp
  template:
    metadata:
      labels:
        app: s3-mcp
        component: mcp-server
    spec:
      serviceAccountName: mcp-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: s3-mcp
          image: tenalirama2026/mainframe-s3-mcp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: BIND_ADDR
              value: "0.0.0.0:8081"
            - name: RUST_LOG
              value: "info"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-mcp-credentials
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-mcp-credentials
                  key: aws-secret-access-key
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: s3-mcp-credentials
                  key: aws-region
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: s3-mcp
  namespace: mainframe-modernization
  labels:
    app: s3-mcp
spec:
  selector:
    app: s3-mcp
  ports:
    - name: http
      port: 8081
      targetPort: 8081
  type: ClusterIP

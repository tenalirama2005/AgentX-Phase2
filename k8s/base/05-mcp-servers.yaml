kind: Deployment
metadata:
  name: rust-mcp
  namespace: mainframe-modernization
  labels:
    app: rust-mcp
    component: mcp-server
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rust-mcp
  template:
    metadata:
      labels:
        app: rust-mcp
        component: mcp-server
    spec:
      serviceAccountName: mcp-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: rust-mcp
          image: tenalirama2026/mainframe-rust-mcp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
              name: http
          env:
            - name: BIND_ADDR
              value: "0.0.0.0:8084"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
